name: CI

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared
        run: npm run build -w @buyseekk/shared

      - name: Test shared package
        run: npm test -w @buyseekk/shared

      - name: Generate Prisma client
        run: npm run prisma:generate -w @buyseekk/api

      - name: Build API
        run: npm run build -w @buyseekk/api

      - name: Validate Prisma schema
        run: npx prisma validate --schema apps/api/prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://buyseekk:buyseekk@localhost:5432/buyseekk

      - name: Lint web
        run: npm run lint -w @buyseekk/web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXT_PUBLIC_SITE_URL: https://buyseekk.com

      - name: Build web
        run: npm run build -w @buyseekk/web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXT_PUBLIC_SITE_URL: https://buyseekk.com
          NEXT_PUBLIC_LAUNCH_COUNTRY: US

  test-e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: buyseekk
          POSTGRES_PASSWORD: buyseekk
          POSTGRES_DB: buyseekk
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U buyseekk -d buyseekk"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared
        run: npm run build -w @buyseekk/shared

      - name: Generate Prisma client
        run: npm run prisma:generate -w @buyseekk/api

      - name: Run e2e tests
        run: npm run test:e2e -w @buyseekk/api
        env:
          DATABASE_URL: postgresql://buyseekk:buyseekk@localhost:5432/buyseekk
          JWT_SECRET: ci-test-jwt-secret-key-32chars
          NODE_ENV: test
          STORAGE_PROVIDER: local
          EMAIL_PROVIDER: console
          LAUNCH_COUNTRY: US
          WEB_URL: http://localhost:3000

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
